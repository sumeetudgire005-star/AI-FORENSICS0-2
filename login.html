<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForensicAI Login</title>
    <link rel="stylesheet" href="login-styles.css">
</head>
<body>
    <nav class="nav">
        <div class="logo">
            <div class="logo-icon"></div>
            <span>DEEPFAKE <span class="ai">AI</span></span>
        </div>
        <button class="theme-btn">☀️</button>
    </nav>

    <main>
        <div class="card">
            <h1>Welcome to DEEPFAKE AI</h1>
            <p class="subtitle">SECURE FORENSIC ANALYSIS PORTAL</p>

            <button class="google-btn" id="googleBtn">
                <span class="g-icon"></span>
                Sign in with Google
            </button>

            <div class="divider"><span>OR</span></div>

            <form id="loginForm">
                <label>INSTITUTIONAL EMAIL</label>
                <input type="email" id="email" placeholder="name@agency.gov" required>

                <div class="label-row">
                    <label>ACCESS KEY</label>
                    <a href="#" class="recovery">RECOVERY</a>
                </div>
                <input type="password" id="password" placeholder="••••••••" required>

                <button type="submit" class="submit-btn">AUTHORIZE ACCESS</button>

                <div class="notice">
                    <span>🛡️</span>
                    <span>END-TO-END ENCRYPTION ENABLED</span>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <span>IT ACT 65B COMPLIANT</span>
        <span>SHA-256 SECURED</span>
        <span>256-BIT SSL</span>
    </footer>

    <script src="login-script.js"></script>
</body>
</html>
